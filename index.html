<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Veda Sahnesi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600&display=swap');
  body {
    margin: 0;
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Caveat', cursive;
  }
  svg { display: block; }
  .tear { animation: fall linear infinite; }
  @keyframes fall {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(28px); opacity: 0; }
  }
  .sob { animation: sob 1.1s ease-in-out infinite; }
  @keyframes sob {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-4px); }
  }
  .shake {
    animation: shake 0.25s infinite alternate;
    transform-origin: center;
  }
  @keyframes shake {
    0% { transform: rotate(-2deg) translateX(-1px); }
    100% { transform: rotate(2deg) translateX(1px); }
  }
  .car-idle { animation: carIdle 2s ease-in-out infinite; }
  @keyframes carIdle {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-3px); }
  }
  .bubble { animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1) 0.6s both; }
  @keyframes popIn {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }
  .heart { animation: heartbeat 0.8s ease-in-out infinite; transform-origin: center; }
  @keyframes heartbeat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.35); }
  }
  .float-up {
    animation: floatUp 2s ease-in infinite;
  }
  @keyframes floatUp {
    0% { transform: translateY(0); opacity: 0.8; }
    100% { transform: translateY(-45px); opacity: 0; }
  }
</style>
</head>
<body>

    </linearGradient>

    <ellipse cx="267" cy="306" rx="2.5" ry="5" fill="#7ecef4" opacity="0.85" class="tear" style="animation-duration:0.7s; animation-delay:0.1s"/>
    <ellipse cx="235" cy="304" rx="2" ry="4" fill="#7ecef4" opacity="0.7" class="tear" style="animation-duration:1s; animation-delay:0.5s"/>
    <ellipse cx="254" cy="305" rx="2" ry="4" fill="#7ecef4" opacity="0.7" class="tear" style="animation-duration:0.85s; animation-delay:0.4s"/>
    <ellipse cx="244" cy="303" rx="2" ry="3.5" fill="#7ecef4" opacity="0.6" class="tear" style="animation-duration:1.1s; animation-delay:0.6s"/>

    <text x="162" y="222" text-anchor="middle" font-family="Caveat,cursive" font-size="28" fill="white" font-weight="bold">aq</text>

  <!-- Tear puddle floor -->
  <ellipse cx="248" cy="496" rx="52" ry="11" fill="#7ecef4" opacity="0.2"/>
  <ellipse cx="248" cy="496" rx="33" ry="7" fill="#7ecef4" opacity="0.16"/>

  <!-- Title -->

  <text x="400" y="78" text-anchor="middle" font-family="Caveat,cursive" font-size="15" fill="#9999cc" opacity="0.7">araba bekliyor... ama o gitmiyor...</text>
</svg>
</body>
